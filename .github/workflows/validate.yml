name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run mypy src/
      - run: uv run pytest
      - run: uv run mkdocs build --strict
      - run: uv build
